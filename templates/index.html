<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT-5 Nano Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="chat-shell">
      <header class="chat-header">
        <p class="eyebrow">Local OpenAI Chat</p>
        <h1>GPT-5 Nano</h1>
        <p class="subhead">Simple web UI connected to your own API key.</p>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <label class="visually-hidden" for="prompt">Your message</label>
        <textarea
          id="prompt"
          name="prompt"
          placeholder="Ask anything..."
          rows="1"
          required
        ></textarea>
        <div class="buttons">
  <button type="button" id="clear-btn" class="ghost">Clear</button>
  <button type="submit" id="send-btn">Send</button>
</div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
